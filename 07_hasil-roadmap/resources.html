<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Resources | Flexa Cendekia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .blueprint-grid {
            background-image: 
                linear-gradient(rgba(23, 34, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 34, 59, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-[#fbf8fb] text-[#1b1b1d] font-sans blueprint-grid min-h-screen">
    <nav class="fixed top-0 w-full bg-[#fbf8fb] z-50 border-b border-[#1b1b1d]/20 flex justify-between items-center h-16 px-4 md:px-8">
        <div class="flex items-center gap-4">
            <span class="font-bold text-2xl text-[#020b24]">Flexa Cendekia</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="code.html" class="text-sm font-semibold border-b-2 border-[#020b24]">Kembali ke Roadmap</a>
        </div>
    </nav>
    
    <main class="pt-24 px-4 md:px-8 max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-[#020b24] mb-8">Bahan Belajar (Resources)</h1>
        
        <div class="space-y-4">
            <div class="bg-white p-4 border border-[#020b24]/20 shadow-[4px_4px_0_0_#020b24] rounded flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded flex justify-center items-center shrink-0">
                    <span class="material-symbols-outlined">menu_book</span>
                </div>
                <div>
                    <h3 class="font-bold text-[#020b24]">Buku: Pengantar Pemikiran Kritis</h3>
                    <p class="text-sm text-gray-600">Fundamental dalam memecahkan masalah kompleks.</p>
                </div>
            </div>
            
            <div class="bg-white p-4 border border-[#020b24]/20 shadow-[4px_4px_0_0_#020b24] rounded flex items-center gap-4">
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded flex justify-center items-center shrink-0">
                    <span class="material-symbols-outlined">ondemand_video</span>
                </div>
                <div>
                    <h3 class="font-bold text-[#020b24]">Video: Tips Lulus SNBT</h3>
                    <p class="text-sm text-gray-600">Simulasi dan strategi mengerjakan soal secara efisien.</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
