<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings | Flexa Cendekia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .blueprint-grid {
            background-image: 
                linear-gradient(rgba(23, 34, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 34, 59, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-[#fbf8fb] text-[#1b1b1d] font-sans blueprint-grid min-h-screen">
    <nav class="fixed top-0 w-full bg-[#fbf8fb] z-50 border-b border-[#1b1b1d]/20 flex justify-between items-center h-16 px-4 md:px-8">
        <div class="flex items-center gap-4">
            <span class="font-bold text-2xl text-[#020b24]">Flexa Cendekia</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="code.html" class="text-sm font-semibold border-b-2 border-[#020b24]">Kembali ke Roadmap</a>
        </div>
    </nav>
    
    <main class="pt-24 px-4 md:px-8 max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-[#020b24] mb-8">Pengaturan Preferensi</h1>
        
        <div class="bg-white p-8 border border-[#020b24]/20 shadow-[4px_4px_0_0_#020b24] rounded max-w-md">
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Notifikasi Pengingat Belajar</label>
                <select class="w-full border-gray-300 rounded shadow-sm focus:border-[#020b24] focus:ring focus:ring-[#020b24]/20">
                    <option>Aktif - Setiap Hari</option>
                    <option>Aktif - Hanya Akhir Pekan</option>
                    <option>Nonaktif</option>
                </select>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Tingkat Kesulitan Rekomendasi</label>
                <select class="w-full border-gray-300 rounded shadow-sm focus:border-[#020b24] focus:ring focus:ring-[#020b24]/20">
                    <option>Reguler (Sesuai Kurikulum)</option>
                    <option>Akselerasi (Menantang)</option>
                </select>
            </div>
            <button class="w-full bg-[#020b24] text-white py-3 rounded font-bold hover:bg-[#17223b] transition-colors">Simpan Pengaturan</button>
        </div>
    </main>
</body>
</html>
