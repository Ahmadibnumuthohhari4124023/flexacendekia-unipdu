    let currentQuestion = 1;
    let answers = {};
    let timeInSeconds = 30 * 60; // 30 minutes
    let timerInterval = null;

    const container = document.getElementById('app-container');

    function render() {
        const q = questions[currentQuestion - 1];
        const answeredCount = Object.keys(answers).length;
        const progressPercent = Math.round((answeredCount / 40) * 100);
        
        let optionsHtml = '';
        const labels = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const isChecked = answers[currentQuestion] === idx ? 'checked' : '';
            const activeClass = isChecked ? 'bg-secondary/10 border-secondary' : '';
            optionsHtml += `
            <div class="group">
                <input class="hidden" id="opt${idx}" name="diagnostic_option" type="radio" ${isChecked} onchange="selectOption(${idx})"/>
                <label class="flex items-start gap-4 p-5 border border-primary/10 hover:bg-surface-container transition-all cursor-pointer group-active:translate-x-1 ${activeClass}" for="opt${idx}">
                <span class="w-6 h-6 rounded-full border-2 border-primary/20 flex items-center justify-center flex-shrink-0 group-hover:border-secondary transition-colors">
                <span class="font-stats-sm text-xs font-bold text-on-surface-variant">${labels[idx]}</span>
                </span>
                <span class="font-body-md text-on-surface">${opt}</span>
                </label>
            </div>
            `;
        });

        let paginationHtml = '';
        // Smart pagination logic (showing surrounding pages)
        let startPage = Math.max(1, currentQuestion - 2);
        let endPage = Math.min(40, currentQuestion + 2);
        if (startPage > 1) {
            paginationHtml += `<button onclick="goTo(1)" class="w-8 h-8 flex items-center justify-center border border-primary/20 text-xs font-stats-sm hover:bg-secondary/10 ${answers[1]!==undefined?'bg-green-100':''}">1</button>`;
            if (startPage > 2) paginationHtml += `<div class="w-8 h-8 flex items-center justify-center text-xs font-stats-sm">...</div>`;
        }
        for (let i = startPage; i <= endPage; i++) {
            const btnClass = (i === currentQuestion) 
                ? 'bg-secondary text-white' 
                : `border border-primary/20 hover:bg-secondary/10 ${answers[i]!==undefined?'bg-green-100':''}`;
            paginationHtml += `<button onclick="goTo(${i})" class="w-8 h-8 flex items-center justify-center text-xs font-stats-sm ${btnClass}">${i}</button>`;
        }
        if (endPage < 40) {
            if (endPage < 39) paginationHtml += `<div class="w-8 h-8 flex items-center justify-center text-xs font-stats-sm">...</div>`;
            paginationHtml += `<button onclick="goTo(40)" class="w-8 h-8 flex items-center justify-center border border-primary/20 text-xs font-stats-sm hover:bg-secondary/10 ${answers[40]!==undefined?'bg-green-100':''}">40</button>`;
        }

        const noteHtml = q.note ? `<div class="bg-background/50 border-l-4 border-secondary p-4 italic text-on-surface-variant font-body-sm">${q.note}</div>` : '';

        const minutes = Math.floor(timeInSeconds / 60);
        const seconds = timeInSeconds % 60;
        const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

        container.innerHTML = `
        <!-- Progress Header -->
        <div class="mb-10">
        <div class="flex justify-between items-end mb-4">
        <div>
        <h1 class="font-headline-md text-headline-md text-primary mb-1">Tes Diagnostik SMP - ${q.category}</h1>
        <p class="font-body-sm text-on-surface-variant">Soal ${currentQuestion} dari 40</p>
        </div>
        <div class="text-right">
        <div class="font-stats-lg text-stats-lg text-secondary mb-1" id="timer">${timeStr}</div>
        <p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest">Sisa Waktu</p>
        </div>
        </div>
        <div class="w-full h-3 bg-surface-container-high rounded-full overflow-hidden border border-primary/10">
        <div class="h-full bg-secondary-container transition-all duration-500" style="width: ${progressPercent}%;"></div>
        </div>
        <div class="flex justify-between mt-2">
        <span class="font-stats-sm text-stats-sm text-on-surface-variant">Status <span class="text-primary font-bold">${answeredCount}</span> terjawab</span>
        <span class="font-stats-sm text-stats-sm text-on-surface-variant">${progressPercent}% Selesai</span>
        </div>
        </div>

        <!-- Question Card -->
        <div class="bg-surface-container-lowest ledger-border p-8 rounded-none relative overflow-hidden mb-8">
        <div class="absolute top-0 right-0 w-24 h-24 pointer-events-none opacity-10">
        <span class="material-symbols-outlined text-[120px] -rotate-12 translate-x-8 -translate-y-8">description</span>
        </div>
        <article class="relative z-10">
        <span class="font-label-caps text-label-caps text-secondary mb-6 block">${q.category}</span>
        <div class="space-y-6">
        <p class="font-headline-md text-xl text-primary leading-relaxed">${q.text}</p>
        ${noteHtml}
        </div>
        <div class="mt-10 space-y-4">
        ${optionsHtml}
        </div>
        </article>
        </div>

        <!-- Footer Navigation -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 py-8 border-t border-primary/10">
        <button onclick="prev()" class="w-full sm:w-auto px-8 py-3 border border-primary text-primary font-label-caps text-label-caps hover:bg-surface-container transition-all flex items-center justify-center gap-2 ${currentQuestion === 1 ? 'opacity-50 cursor-not-allowed' : ''}">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Sebelumnya
        </button>
        <div class="flex gap-2 order-3 sm:order-2">${paginationHtml}</div>
        <button onclick="${currentQuestion === 40 ? 'finish()' : 'next()'}" class="w-full sm:w-auto px-10 py-3 bg-primary text-white font-label-caps text-label-caps ledger-shadow hover:translate-y-[-2px] hover:translate-x-[-2px] active:translate-y-0 active:translate-x-0 transition-all flex items-center justify-center gap-2 order-2 sm:order-3">
        ${currentQuestion === 40 ? 'Selesai' : 'Lanjutkan'}
        <span class="material-symbols-outlined text-sm">${currentQuestion === 40 ? 'check' : 'arrow_forward'}</span>
        </button>
        </div>

        <!-- Shortcut Legend -->
        <div class="mt-12 flex justify-center gap-8 opacity-40">
        <div class="flex items-center gap-2">
        <span class="px-1.5 py-0.5 border border-primary rounded text-[10px] font-stats-sm">ALT + N</span>
        <span class="font-label-caps text-[10px]">Next</span>
        </div>
        <div class="flex items-center gap-2">
        <span class="px-1.5 py-0.5 border border-primary rounded text-[10px] font-stats-sm">ALT + P</span>
        <span class="font-label-caps text-[10px]">Prev</span>
        </div>
        <div class="flex items-center gap-2">
        <span class="px-1.5 py-0.5 border border-primary rounded text-[10px] font-stats-sm">1-4</span>
        <span class="font-label-caps text-[10px]">Pilih Opsi</span>
        </div>
        </div>
        `;
    }

    function selectOption(idx) {
        answers[currentQuestion] = idx;
        render();
    }

    function prev() {
        if (currentQuestion > 1) {
            currentQuestion--;
            render();
        }
    }

    function next() {
        if (currentQuestion < 40) {
            currentQuestion++;
            render();
        }
    }

    function goTo(page) {
        currentQuestion = page;
        render();
    }
    
    function finish() {
        localStorage.setItem('diagnosisAnswers', JSON.stringify(answers));
        window.location.href = '/?page=04_hasil-diagnosis';
    }

    function updateTimer() {
        if (timeInSeconds > 0) {
            timeInSeconds--;
            const timerElement = document.getElementById('timer');
            if (timerElement) {
                const minutes = Math.floor(timeInSeconds / 60);
                const seconds = timeInSeconds % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        } else {
            clearInterval(timerInterval);
            alert('Waktu ujian telah berakhir!');
            finish();
        }
    }

    // Key bindings for navigation simulation
    document.addEventListener('keydown', (e) => {
        if (e.altKey && e.key.toLowerCase() === 'n') {
            e.preventDefault();
            next();
        } else if (e.altKey && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            prev();
        } else if (e.key >= '1' && e.key <= '4') {
            const idx = parseInt(e.key) - 1;
            selectOption(idx);
        }
    });

    render();
    timerInterval = setInterval(updateTimer, 1000);
</script>

<script>
(function(){
  function bindClick(selectors, handler) {
    document.querySelectorAll(selectors).forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (el.hasAttribute('onclick') || el.id === 'btn-unduh' || el.id === 'btn-bagikan' || el.id === 'btn-notifikasi' || el.id === 'btn-bantuan' || el.id === 'btn-profile' || el.closest('#notif-wrapper') || el.closest('#help-wrapper') || el.closest('#profile-wrapper')) {
            return;
        }
        if (el.tagName.toLowerCase() === 'a' && el.getAttribute('href') !== '#') {
            return;
        }
        e.preventDefault();
        handler(e, el);
      });
    });
  }

  // 1. Top Navbar Role Tabs
  bindClick('header nav a', function(e, a) {
    var text = a.textContent.trim().toLowerCase();
    if (text === 'siswa') window.location.href = '/?page=08_dashboard-siswa';
    else if (text === 'guru') window.location.href = '/?page=14_dashboard-guru';
    else if (text === 'orang tua') window.location.href = '/?page=16_dashboard-ortu';
  });

  // 2. Header Icons & Avatar
  bindClick('header button, header div.rounded-full.bg-primary', function(e, b) {
    var iconText = '';
    if (b.classList.contains('material-symbols-outlined')) iconText = b.textContent.trim();
    else {
      var icon = b.querySelector('.material-symbols-outlined');
      if (icon) iconText = icon.textContent.trim();
    }
    
    if (iconText === 'notifications') window.location.href = '/?page=17_notifikasi';
    else if (iconText === 'settings' || iconText === 'account_circle' || iconText === 'person' || b.classList.contains('rounded-full')) {
      window.location.href = '/?page=18_profil';
    }
  });

  // 3. Sidebar, Bottom Nav, and generic # links
  bindClick('aside a, div.fixed.bottom-0 button, div[class*="md:hidden"] button, a[href="#"]', function(e, el) {
    var text = el.textContent.trim().toLowerCase();
    if (!text) {
        var icon = el.querySelector('.material-symbols-outlined');
        if (icon) text = icon.textContent.trim().toLowerCase();
    }
    
    if (text === 'beranda' || text === 'dashboard' || text === 'home') window.location.href = '/?page=08_dashboard-siswa';
    else if (text.includes('krs') || text.includes('rencana studi') || text.includes('study plans')) window.location.href = '/?page=09_krs-siswa';
    else if (text.includes('roadmap') || text.includes('detail roadmap')) window.location.href = '/?page=10_detail-roadmap';
    else if (text.includes('checkpoint') || text.includes('jumat')) window.location.href = '/?page=11_checkpoint-jumat';
    else if (text.includes('riwayat') || text === 'grades') window.location.href = '/?page=13_riwayat-semester';
    else if (text.includes('ganti cita')) window.location.href = '/?page=12_ganti-cita-cita';
    else if (text.includes('profil') || text === 'settings' || text === 'person') window.location.href = '/?page=18_profil';
    else if (text.includes('notifikasi') || text === 'notifications') window.location.href = '/?page=17_notifikasi';
    else if (text.includes('tinjauan') || text.includes('review') || text.includes('tinjau')) window.location.href = '/?page=15_tinjauan-guru';
    else if (text.includes('keluar') || text.includes('logout')) window.location.href = '/?page=01_login';
    else if (text.includes('tes diagnostik')) window.location.href = '/?page=02_intro-diagnosis';
  });
  
  document.querySelectorAll('header div.rounded-full.bg-primary').forEach(function(el){ el.style.cursor = 'pointer'; });
})();
</script>

</body></html>
