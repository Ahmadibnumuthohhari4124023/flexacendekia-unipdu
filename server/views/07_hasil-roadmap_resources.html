<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bahan Belajar | Flexa Cendekia</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&amp;family=Libre+Franklin:ital,wght@0,100..900;1,100..900&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#020b24",
                        "primary-container": "#17223b",
                        "secondary": "#805600",
                        "secondary-container": "#fdc265",
                        "surface": "#fbf8fb",
                        "surface-container": "#f0edf0",
                        "on-surface": "#1b1b1d",
                        "on-surface-variant": "#45464d",
                        "outline-variant": "#c6c6ce"
                    },
                    fontFamily: {
                        "display": ['"Source Serif 4"'],
                        "body": ["Libre Franklin"],
                        "mono": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .blueprint-grid {
            background-image: 
                linear-gradient(rgba(23, 34, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 34, 59, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .hard-shadow { box-shadow: 4px 4px 0px 0px #020b24; }
        .resource-card { opacity: 0; transform: translateY(20px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .resource-card.visible { opacity: 1; transform: translateY(0); }
        .filter-active { background-color: #020b24 !important; color: white !important; }
    </style>
</head>
<body class="bg-[#EAEDE2] text-on-surface font-body blueprint-grid min-h-screen">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full bg-surface z-50 border-b border-on-surface/20 flex justify-between items-center h-16 px-4 md:px-8">
        <div class="flex items-center gap-4">
            <span class="font-display font-bold text-2xl text-primary">Flexa Cendekia</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/?page=07_hasil-roadmap" class="flex items-center gap-2 text-sm font-semibold text-primary hover:text-secondary transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Kembali ke Roadmap
            </a>
        </div>
    </nav>
    
    <main class="pt-24 pb-16 px-4 md:px-8 max-w-5xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-secondary-container/30 border border-secondary rounded-full mb-4">
                <span class="material-symbols-outlined text-secondary text-sm">auto_awesome</span>
                <span class="font-mono text-[11px] text-secondary font-bold tracking-widest uppercase">AI-Curated Resources</span>
            </div>
            <h1 class="font-display font-bold text-4xl md:text-5xl text-primary mb-3" id="page-title">Bahan Belajar</h1>
            <p class="text-on-surface-variant max-w-xl mx-auto" id="page-subtitle">Koleksi buku, kursus, dan tools pilihan AI untuk mendukung perjalanan Anda.</p>
        </div>

        <!-- Filter Tabs -->
        <div class="flex flex-wrap justify-center gap-2 mb-10">
            <button class="filter-btn filter-active px-4 py-2 border border-primary/20 text-sm font-bold rounded-full transition-all hover:bg-primary hover:text-white" data-type="all">Semua</button>
            <button class="filter-btn px-4 py-2 bg-white border border-primary/20 text-sm font-bold rounded-full transition-all hover:bg-primary hover:text-white" data-type="book">📚 Buku</button>
            <button class="filter-btn px-4 py-2 bg-white border border-primary/20 text-sm font-bold rounded-full transition-all hover:bg-primary hover:text-white" data-type="course">🎓 Kursus</button>
            <button class="filter-btn px-4 py-2 bg-white border border-primary/20 text-sm font-bold rounded-full transition-all hover:bg-primary hover:text-white" data-type="tool">🛠️ Tools</button>
        </div>

        <!-- Resources Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="resources-container">
            <!-- Items will be rendered by JS -->
        </div>
    </main>

    <script>
    const careerResourcesMap = {
        'arsitek': [
            { title: 'Arsitektur Bentuk, Ruang & Tatanan', author: 'Francis D.K. Ching', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Panduan klasik tentang prinsip dasar perancangan arsitektur.' },
            { title: 'SketchUp untuk Arsitek', author: 'SketchUp Academy', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Tutorial lengkap pemodelan 3D dari dasar hingga mahir.' },
            { title: 'AutoCAD Student License', author: 'Autodesk', type: 'tool', icon: 'build', color: 'orange', desc: 'Software CAD standar industri arsitektur, gratis untuk pelajar.' },
            { title: 'Toward an Architecture', author: 'Le Corbusier', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Manifesto arsitektur modern yang wajib dibaca setiap calon arsitek.' },
            { title: 'Sustainable Architecture', author: 'Coursera - TU Delft', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Prinsip keberlanjutan dan desain ramah lingkungan.' },
            { title: 'Lumion Visualization', author: 'Act-3D', type: 'tool', icon: 'build', color: 'orange', desc: 'Rendering 3D real-time untuk presentasi arsitektur profesional.' }
        ],
        'data scientist': [
            { title: 'Python for Data Analysis', author: 'Wes McKinney', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Panduan lengkap analisis data dengan Python, Pandas, dan NumPy.' },
            { title: 'Machine Learning Specialization', author: 'Coursera - Andrew Ng', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Kursus ML terbaik di dunia dari Stanford University.' },
            { title: 'Jupyter Notebook', author: 'Project Jupyter', type: 'tool', icon: 'build', color: 'orange', desc: 'IDE interaktif standar untuk eksplorasi dan analisis data.' },
            { title: 'Hands-On Machine Learning', author: 'Aurélien Géron', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Implementasi praktis ML dengan Scikit-Learn, Keras, dan TensorFlow.' },
            { title: 'SQL for Data Science', author: 'Coursera - UC Davis', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Penguasaan query database untuk pengolahan data berskala besar.' },
            { title: 'Tableau Public', author: 'Tableau Software', type: 'tool', icon: 'build', color: 'orange', desc: 'Platform visualisasi data profesional gratis untuk pelajar.' }
        ],
        'arsitek sistem': [
            { title: 'Designing Data-Intensive Applications', author: 'Martin Kleppmann', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Bible untuk memahami arsitektur sistem data modern.' },
            { title: 'AWS Solutions Architect', author: 'AWS Training', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Sertifikasi arsitektur cloud paling diminati di industri.' },
            { title: 'Docker Desktop', author: 'Docker Inc.', type: 'tool', icon: 'build', color: 'orange', desc: 'Platform containerization standar untuk pengembangan modern.' },
            { title: 'Clean Architecture', author: 'Robert C. Martin', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Prinsip arsitektur perangkat lunak yang bersih dan maintainable.' },
            { title: 'Kubernetes for Beginners', author: 'Udemy - Mumshad', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Orkestrasi container dari dasar hingga production-ready.' },
            { title: 'Terraform', author: 'HashiCorp', type: 'tool', icon: 'build', color: 'orange', desc: 'Infrastructure as Code untuk provisioning cloud otomatis.' }
        ],
        'dokter': [
            { title: 'Atlas Anatomi Manusia Netter', author: 'Frank H. Netter', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Atlas anatomi paling detail dan berwarna standar kedokteran dunia.' },
            { title: 'Anatomi & Fisiologi', author: 'Khan Academy', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Pengantar sistem tubuh manusia secara visual dan interaktif.' },
            { title: 'Complete Anatomy (3D4Medical)', author: '3D4Medical', type: 'tool', icon: 'build', color: 'orange', desc: 'Platform anatomi 3D interaktif untuk eksplorasi tubuh manusia.' },
            { title: "Guyton's Textbook of Medical Physiology", author: 'John E. Hall', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Textbook fisiologi paling komprehensif untuk mahasiswa kedokteran.' },
            { title: 'Farmakologi Klinis', author: 'Coursera - UPenn', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Prinsip dasar farmakologi dan mekanisme kerja obat.' },
            { title: 'Anki Flashcards Medical', author: 'Komunitas Anki', type: 'tool', icon: 'build', color: 'orange', desc: 'Sistem spaced repetition terbaik untuk menghafal terminologi medis.' }
        ],
        'akuntan': [
            { title: 'Pengantar Akuntansi (PSAK)', author: 'IAI', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Standar akuntansi keuangan Indonesia yang wajib dipahami.' },
            { title: 'Financial Accounting Fundamentals', author: 'Coursera - UVA', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Dasar akuntansi keuangan dari University of Virginia.' },
            { title: 'MYOB Accounting', author: 'MYOB', type: 'tool', icon: 'build', color: 'orange', desc: 'Software akuntansi populer untuk praktik pembukuan digital.' },
            { title: 'Auditing & Assurance Services', author: 'Arens, Elder, Beasley', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Textbook audit komprehensif standar internasional.' },
            { title: 'Perpajakan Indonesia', author: 'DJP Online Learning', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Pelatihan perpajakan resmi dari Direktorat Jenderal Pajak.' },
            { title: 'Microsoft Power BI', author: 'Microsoft', type: 'tool', icon: 'build', color: 'orange', desc: 'Visualisasi data keuangan dan dashboard bisnis interaktif.' }
        ],
        'peneliti biologi': [
            { title: 'Campbell Biology', author: 'Lisa A. Urry et al.', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Textbook biologi paling komprehensif dan menjadi standar dunia.' },
            { title: 'Introduction to Biology', author: 'edX - MIT', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Pengantar biologi dari Massachusetts Institute of Technology.' },
            { title: 'ImageJ / FIJI', author: 'NIH', type: 'tool', icon: 'build', color: 'orange', desc: 'Software analisis gambar mikroskopis standar laboratorium.' },
            { title: 'Molecular Biology of the Cell', author: 'Bruce Alberts et al.', type: 'book', icon: 'menu_book', color: 'blue', desc: 'Referensi utama biologi molekuler dan biokimia sel.' },
            { title: 'Bioinformatics Specialization', author: 'Coursera - UCSD', type: 'course', icon: 'ondemand_video', color: 'green', desc: 'Spesialisasi bioinformatika untuk analisis data genomik.' },
            { title: 'MEGA (Molecular Evolutionary Genetics Analysis)', author: 'Penn State', type: 'tool', icon: 'build', color: 'orange', desc: 'Software analisis filogenetik dan evolusi molekuler.' }
        ]
    };

    const colorMap = {
        blue: { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-200' },
        green: { bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200' },
        orange: { bg: 'bg-amber-50', text: 'text-amber-600', border: 'border-amber-200' }
    };

    const typeLabels = { book: '📚 Buku', course: '🎓 Kursus', tool: '🛠️ Tool' };

    let currentFilter = 'all';
    let currentResources = [];

    function renderResources(resources) {
        const container = document.getElementById('resources-container');
        const filtered = currentFilter === 'all' ? resources : resources.filter(r => r.type === currentFilter);
        
        container.innerHTML = filtered.map((r, index) => {
            const c = colorMap[r.color] || colorMap.blue;
            return `
            <div class="resource-card bg-white border border-primary/15 p-6 hard-shadow hover:translate-y-[-2px] hover:shadow-[6px_6px_0_0_#020b24] transition-all duration-300 group flex flex-col" style="transition-delay: ${index * 80}ms">
                <!-- Type Badge & Icon -->
                <div class="flex items-start justify-between mb-4">
                    <div class="w-12 h-12 ${c.bg} ${c.border} border rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined ${c.text}">${r.icon}</span>
                    </div>
                    <span class="font-mono text-[10px] ${c.bg} ${c.text} px-2 py-1 rounded-full font-bold border ${c.border}">${typeLabels[r.type] || r.type}</span>
                </div>
                
                <!-- Content -->
                <h3 class="font-bold text-primary text-lg mb-1 leading-snug">${r.title}</h3>
                <p class="font-mono text-[11px] text-secondary mb-3">${r.author}</p>
                <p class="text-on-surface-variant text-sm leading-relaxed flex-grow">${r.desc}</p>
                
                <!-- Action -->
                <div class="mt-4 pt-4 border-t border-primary/5">
                    <button class="flex items-center gap-2 text-secondary font-bold text-sm hover:text-primary transition-colors group/btn">
                        <span>Lihat Detail</span>
                        <span class="material-symbols-outlined text-sm group-hover/btn:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </div>
            </div>`;
        }).join('');

        if (filtered.length === 0) {
            container.innerHTML = '<p class="text-on-surface-variant text-center col-span-full py-12">Tidak ada resource di kategori ini.</p>';
        }

        // Animate cards
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        container.querySelectorAll('.resource-card').forEach(card => observer.observe(card));
    }

    document.addEventListener('DOMContentLoaded', () => {
        const careerTitle = localStorage.getItem('selectedCareer') || 'Arsitek';
        currentResources = careerResourcesMap[careerTitle.toLowerCase()] || careerResourcesMap['arsitek'];
        
        document.getElementById('page-title').textContent = `Resources: Jalur ${careerTitle}`;
        document.getElementById('page-subtitle').textContent = `Buku, kursus online, dan tools pilihan AI untuk mendukung perjalanan menjadi ${careerTitle} profesional.`;
        
        renderResources(currentResources);

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('filter-active');
                    b.classList.add('bg-white');
                });
                btn.classList.add('filter-active');
                btn.classList.remove('bg-white');
                currentFilter = btn.dataset.type;
                renderResources(currentResources);
            });
        });
    });
    </script>

<script>
(function(){
  function bindClick(selectors, handler) {
    document.querySelectorAll(selectors).forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (el.hasAttribute('onclick') || el.id === 'btn-unduh' || el.id === 'btn-bagikan' || el.id === 'btn-notifikasi' || el.id === 'btn-bantuan' || el.id === 'btn-profile' || el.closest('#notif-wrapper') || el.closest('#help-wrapper') || el.closest('#profile-wrapper')) {
            return;
        }
        if (el.tagName.toLowerCase() === 'a' && el.getAttribute('href') !== '#') {
            return;
        }
        e.preventDefault();
        handler(e, el);
      });
    });
  }

  // 1. Top Navbar Role Tabs
  bindClick('header nav a', function(e, a) {
    var text = a.textContent.trim().toLowerCase();
    if (text === 'siswa') window.location.href = '/?page=08_dashboard-siswa';
    else if (text === 'guru') window.location.href = '/?page=14_dashboard-guru';
    else if (text === 'orang tua') window.location.href = '/?page=16_dashboard-ortu';
  });

  // 2. Header Icons & Avatar
  bindClick('header button, header div.rounded-full.bg-primary', function(e, b) {
    var iconText = '';
    if (b.classList.contains('material-symbols-outlined')) iconText = b.textContent.trim();
    else {
      var icon = b.querySelector('.material-symbols-outlined');
      if (icon) iconText = icon.textContent.trim();
    }
    
    if (iconText === 'notifications') window.location.href = '/?page=17_notifikasi';
    else if (iconText === 'settings' || iconText === 'account_circle' || iconText === 'person' || b.classList.contains('rounded-full')) {
      window.location.href = '/?page=18_profil';
    }
  });

  // 3. Sidebar, Bottom Nav, and generic # links
  bindClick('aside a, div.fixed.bottom-0 button, div[class*="md:hidden"] button, a[href="#"]', function(e, el) {
    var text = el.textContent.trim().toLowerCase();
    if (!text) {
        var icon = el.querySelector('.material-symbols-outlined');
        if (icon) text = icon.textContent.trim().toLowerCase();
    }
    
    if (text === 'beranda' || text === 'dashboard' || text === 'home') window.location.href = '/?page=08_dashboard-siswa';
    else if (text.includes('krs') || text.includes('rencana studi') || text.includes('study plans')) window.location.href = '/?page=09_krs-siswa';
    else if (text.includes('roadmap') || text.includes('detail roadmap')) window.location.href = '/?page=10_detail-roadmap';
    else if (text.includes('checkpoint') || text.includes('jumat')) window.location.href = '/?page=11_checkpoint-jumat';
    else if (text.includes('riwayat') || text === 'grades') window.location.href = '/?page=13_riwayat-semester';
    else if (text.includes('ganti cita')) window.location.href = '/?page=12_ganti-cita-cita';
    else if (text.includes('profil') || text === 'settings' || text === 'person') window.location.href = '/?page=18_profil';
    else if (text.includes('notifikasi') || text === 'notifications') window.location.href = '/?page=17_notifikasi';
    else if (text.includes('tinjauan') || text.includes('review') || text.includes('tinjau')) window.location.href = '/?page=15_tinjauan-guru';
    else if (text.includes('keluar') || text.includes('logout')) window.location.href = '/?page=01_login';
    else if (text.includes('tes diagnostik')) window.location.href = '/?page=02_intro-diagnosis';
  });
  
  document.querySelectorAll('header div.rounded-full.bg-primary').forEach(function(el){ el.style.cursor = 'pointer'; });
})();
</script>

</body>
</html>
